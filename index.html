<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shipay PIX</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="header">
    <div class="header-left">
      <div class="logo">S$</div>
      <div class="header-title">
        <h1>Shipay PIX</h1>
      </div>
    </div>
    <span class="env-badge">Pix</span>
  </div>

  <div class="content">
    <div class="status-panel">
      <div class="muted-text" id="empty-state">
        Lendo QR da aba...
      </div>

      <div id="captured-state" style="display:none;">
        <div class="info-label">Transaction ID capturado:</div>
        <div class="info-value" id="txid-value"></div>
        <button class="btn btn-primary" id="pay-btn">Pagar</button>
        <div class="result-msg" id="result-msg"></div>
      </div>
    </div>

    <button class="btn" id="refresh-btn">↻ Atualizar leitura</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
